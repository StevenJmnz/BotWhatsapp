<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Bot WhatsApp</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
  h1 { color: #333; text-align: center; }
  .grupo { background: #fff; padding: 15px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
  th { background-color: #eee; }
  tr.confirmado td { background-color: #d4edda; }
  tr.reemplazo td { background-color: #fff3cd; }
</style>
</head>
<body>
<h1>Dashboard Bot WhatsApp</h1>
<div id="dashboard"></div>

<script>
async function loadStatus() {
    try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const container = document.getElementById('dashboard');
        container.innerHTML = '';

        for (const grupoID in data.grupos) {
            const nombreGrupo = data.grupos[grupoID];
            const confirmados = data.confirmados[grupoID] || [];
            const reemplazos = data.reemplazos[grupoID] || [];
            const sexo = data.sexo[grupoID] || {};

            const div = document.createElement('div');
            div.className = 'grupo';
            div.innerHTML = `<h2>${nombreGrupo}</h2>
                <table>
                <tr><th>Tipo</th><th>Usuarios</th></tr>
                <tr class="confirmado"><td>Confirmados</td><td>${confirmados.map(u => `${u} (${sexo[u]||'-'})`).join(', ') || 'Nadie'}</td></tr>
                <tr class="reemplazo"><td>Reemplazos</td><td>${reemplazos.join(', ') || 'Nadie'}</td></tr>
                </table>`;
            container.appendChild(div);
        }
    } catch(err) {
        console.error('Error cargando status:', err);
    }
}

// Actualiza cada 10 segundos
loadStatus();
setInterval(loadStatus, 10000);
</script>
</body>
</html>
