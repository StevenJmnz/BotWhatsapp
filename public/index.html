<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Bot WhatsApp</title>
<style>
body { font-family: sans-serif; margin: 20px; background:#f5f5f5; }
h1 { color:#333; }
table { border-collapse: collapse; width: 100%; margin-bottom: 20px; background:#fff; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background: #eee; }
</style>
</head>
<body>
<h1>Dashboard Bot WhatsApp</h1>
<div id="content">Cargando estado...</div>

<script>
async function fetchStatus(){
    try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const grupos = data.grupos || {};
        const confirmados = data.confirmados || {};
        const reemplazos = data.reemplazos || {};
        const sexo = data.sexo || {};

        let html = '';

        for(const grupoID in grupos){
            html += `<h2>${grupos[grupoID]}</h2>`;
            
            html += `<table><tr><th>Teléfono</th><th>Estado</th><th>Sexo</th></tr>`;
            
            // Confirmados
            if(confirmados[grupoID]){
                confirmados[grupoID].forEach(tel => {
                    html += `<tr><td>${tel}</td><td>Confirmado</td><td>${sexo[grupoID]?.[tel] === "H" ? "Hombre" : "Mujer"}</td></tr>`;
                });
            }

            // Reemplazos
            if(reemplazos[grupoID]){
                reemplazos[grupoID].forEach(tel => {
                    html += `<tr><td>${tel}</td><td>Reemplazo</td><td>-</td></tr>`;
                });
            }

            html += `</table>`;
        }

        document.getElementById('content').innerHTML = html;

    } catch(err){
        document.getElementById('content').innerText = "Error cargando estado: " + err.message;
    }
}

// Actualiza cada 10 segundos
fetchStatus();
setInterval(fetchStatus, 10000);
</script>
</body>
</html>
